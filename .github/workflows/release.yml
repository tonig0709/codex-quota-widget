name: Release macOS app

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  release:
    runs-on: macos-15
    steps:
      - uses: actions/checkout@v4

      - name: Build app and widget
        run: |
          xcodebuild \
            -project CodexQuotaWidget.xcodeproj \
            -scheme CodexQuota \
            -configuration Release \
            -derivedDataPath "$PWD/build" \
            CODE_SIGNING_ALLOWED=NO \
            clean build

      - name: Apply ad-hoc signature
        run: |
          app="$PWD/build/Build/Products/Release/Codex Quota.app"
          widget="$app/Contents/PlugIns/CodexQuotaWidgetExtension.appex"

          /usr/bin/codesign --force --sign - \
            --entitlements Widget/CodexQuotaWidget.entitlements \
            "$widget"
          /usr/bin/codesign --force --sign - \
            --entitlements App/CodexQuota.entitlements \
            "$app"
          /usr/bin/codesign --verify --deep --strict "$app"

      - name: Package app
        run: |
          archive="Codex-Quota-${GITHUB_REF_NAME}-macOS.zip"
          dmg="Codex-Quota-${GITHUB_REF_NAME}-macOS.dmg"
          checksums="Codex-Quota-${GITHUB_REF_NAME}-checksums.txt"
          /usr/bin/ditto -c -k --sequesterRsrc --keepParent \
            "$PWD/build/Build/Products/Release/Codex Quota.app" \
            "$archive"
          mkdir "$PWD/dmg-root"
          /usr/bin/ditto "$PWD/build/Build/Products/Release/Codex Quota.app" \
            "$PWD/dmg-root/Codex Quota.app"
          ln -s /Applications "$PWD/dmg-root/Applications"
          hdiutil create -volname "Codex Quota" -srcfolder "$PWD/dmg-root" \
            -ov -format UDZO "$dmg"
          shasum -a 256 "$archive" "$dmg" > "$checksums"

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          archive="Codex-Quota-${GITHUB_REF_NAME}-macOS.zip"
          dmg="Codex-Quota-${GITHUB_REF_NAME}-macOS.dmg"
          checksums="Codex-Quota-${GITHUB_REF_NAME}-checksums.txt"
          gh release create "$GITHUB_REF_NAME" \
            "$archive" \
            "$dmg" \
            "$checksums" \
            --title "Codex Quota ${GITHUB_REF_NAME}" \
            --generate-notes
